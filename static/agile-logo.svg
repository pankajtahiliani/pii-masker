<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <!-- Circular agile loop arrows -->
  <g transform="translate(28,28)">
    <!-- Top half arc (clockwise) -->
    <path d="M -19 0 A 19 19 0 0 1 19 0" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
    <!-- Top arrowhead -->
    <polygon points="19,0 10,-10 25,-7" fill="#dc2626"/>
    <!-- Bottom half arc (clockwise) -->
    <path d="M 19 0 A 19 19 0 0 1 -19 0" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
    <!-- Bottom arrowhead -->
    <polygon points="-19,0 -10,10 -25,7" fill="#dc2626"/>
  </g>
  <!-- AGILE text -->
  <text x="66" y="35"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="26" font-weight="900" fill="#1d4ed8" letter-spacing="3">AGILE</text>
</svg>
